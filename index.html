<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck - Your Spotify Stats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Libreria per trasformare il codice in immagine per Instagram -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="login-container">
        <h1>VibeCheck</h1>
        <p>Your Spotify stats in real time</p>

        <button id="login-btn">Login with Spotify</button>

        <!-- LIVE STATUS: Cosa stai ascoltando ora -->
        <div id="live-status-container"></div>

        <div id="filters-container" style="display: none;">
            <button id="btn-short">Last 4 Weeks</button>
            <button id="btn-medium">Last 6 months</button>
            <button id="btn-long">Forever</button>
        </div>

        <!-- BOTTONI AZIONE: Playlist e Instagram -->
        <div id="actions-container" style="display: none; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            <button id="btn-playlist" style="background-color: #1DB954; color: black;">Generate Playlist</button>
            <button id="btn-export" style="background-color: #ff007f; color: white;">Download for IG</button>
        </div>

        <!-- VIBE SCORE: L'analisi tecnica -->
        <div id="vibe-score-container"></div>

        <!-- CLASSIFICA: I tuoi top artisti e canzoni -->
        <div id="stats-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
