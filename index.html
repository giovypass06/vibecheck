<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck - Le tue statistiche Spotify</title>
</head>
<body>

    <div class="login-container">
        <h1>VibeCheck</h1>
        <p>Why wait until December? Check your real-time Spotify stats today.</p>
        
        <button id="login-btn">Accedi con Spotify</button>
        
        <!-- I bottoni per i filtri temporali -->
        <div id="filters-container" style="display: none; margin-bottom: 20px;">
            <button id="btn-short">Ultime 4 Settimane</button>
            <button id="btn-medium">Ultimi 6 Mesi</button>
            <button id="btn-long">Di Sempre</button>
        </div>
        
        <!-- Il contenitore dove JS stamperà i dati -->
        <div id="stats-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
